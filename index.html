<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pashaoffc · main</title>
    <!-- font-awesome icons (v6 free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0c0f 0%, #1b1f26 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: #edf2f7;
            line-height: 1.5;
        }

        /* main card – glassmorphism with dark edges */
        .portfolio {
            max-width: 1100px;
            width: 100%;
            background: rgba(22, 26, 32, 0.75);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 3.5rem;
            padding: 2.8rem 2.8rem 2.8rem 2.8rem;
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.9), inset 0 1px 1px rgba(255,255,255,0.03);
            transition: all 0.3s ease;
        }

        /* profile header area */
        .profile-row {
            display: flex;
            flex-wrap: wrap;
            gap: 2.5rem;
            align-items: center;
            margin-bottom: 3rem;
        }

        .avatar-frame {
            flex-shrink: 0;
            background: linear-gradient(135deg, #9146ff, #3b1e6b);
            padding: 5px;
            border-radius: 40% 60% 40% 60% / 50% 40% 60% 50%;
            animation: morph 10s ease-in-out infinite;
            box-shadow: 0 25px 40px -10px #00000080;
        }

        .avatar-frame img {
            display: block;
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: inherit;
            background: #1e2128;
            border: 3px solid rgba(255,255,255,0.03);
        }

        @keyframes morph {
            0% { border-radius: 40% 60% 40% 60% / 50% 40% 60% 50%; }
            25% { border-radius: 50% 50% 40% 60% / 50% 60% 40% 50%; }
            50% { border-radius: 60% 40% 50% 50% / 40% 60% 40% 60%; }
            75% { border-radius: 40% 60% 60% 40% / 60% 30% 70% 40%; }
            100% { border-radius: 40% 60% 40% 60% / 50% 40% 60% 50%; }
        }

        .title-section h1 {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #ffffff, #c0b7e6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        .title-section .handle {
            font-size: 1.5rem;
            font-weight: 400;
            color: #a6b3cf;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 0.25rem;
        }

        .title-section .handle i {
            color: #8f9bb5;
            font-size: 1.4rem;
        }

        .title-section .bio {
            margin-top: 1.2rem;
            font-size: 1.2rem;
            color: #b9c2d9;
            max-width: 600px;
            border-left: 4px solid #6d5f9e;
            padding-left: 1.3rem;
            background: rgba(0,0,0,0.2);
            border-radius: 0 12px 12px 0;
            font-style: italic;
        }

        /* social grid – tiktok + youtube + github */
        .social-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin: 3rem 0 2.2rem 0;
            justify-content: flex-start;
        }

        .social-card {
            background: rgba(16, 20, 26, 0.7);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 2rem;
            padding: 0.9rem 1.8rem;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.35rem;
            transition: 0.2s;
            box-shadow: 0 12px 18px -10px #00000055;
            text-decoration: none;
            color: white;
            flex: 0 1 auto;
            border-bottom: 3px solid transparent;
        }

        .social-card:hover {
            border-bottom: 3px solid #a970ff;
            background: rgba(30, 35, 45, 0.9);
            transform: translateY(-4px);
            box-shadow: 0 24px 28px -12px #000000cc;
        }

        .social-card i {
            font-size: 2rem;
        }

        .social-card span {
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .tiktok-color { color: #ff0050; }
        .youtube-color { color: #ff0033; } 
        .github-color { color: #f0f0f0; }

        /* language pills – exactly html, python, lua */
        .language-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin: 2rem 0 1.5rem 0;
        }

        .lang-pill {
            background: rgba(24, 28, 36, 0.8);
            backdrop-filter: blur(4px);
            border: 1px solid #3b3f4d;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            color: #d6e0ff;
            box-shadow: 0 6px 10px rgba(0,0,0,0.4);
        }

        .lang-pill i {
            font-size: 1.4rem;
        }

        .html5-color { color: #e44d26; }
        .python-color { color: #3776ab; }
        .lua-color { color: #000080; } 

        /* github extras – generic portfolio text */
        .github-extras {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 2rem;
            padding: 1.4rem 2rem;
            margin-top: 2rem;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .repo-preview {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .repo-preview i {
            font-size: 2rem;
            color: #b7c3e3;
        }

        .repo-preview .info small {
            display: block;
            color: #98a1bb;
            font-size: 0.9rem;
        }

        .repo-preview .info strong {
            font-size: 1.2rem;
            font-weight: 500;
        }

        .pill-link {
            background: #2d3341;
            padding: 0.6rem 1.4rem;
            border-radius: 3rem;
            color: white;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #4e5468;
            transition: 0.2s;
        }

        .pill-link:hover {
            background: #3f465a;
            border-color: #a970ff;
        }

        .pill-link i {
            font-size: 1rem;
        }

        .footnote {
            margin-top: 2.5rem;
            font-size: 0.9rem;
            color: #7f8aa8;
            text-align: center;
            border-top: 1px dashed #2e3440;
            padding-top: 1.5rem;
        }

        .footnote a {
            color: #b9adff;
            text-decoration: none;
        }

        .footnote a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .portfolio { padding: 1.8rem; }
            .title-section h1 { font-size: 2.4rem; }
            .social-card { padding: 0.7rem 1.2rem; font-size: 1.2rem; }
            .avatar-frame img { width: 110px; height: 110px; }
        }
    </style>
</head>
<body>
    <div class="portfolio">
        <!-- profile intro with avatar (placeholder image, replace with your own) -->
        <div class="profile-row">
            <div class="avatar-frame">
                <!-- REPLACE THIS SRC WITH YOUR REAL AVATAR URL -->
                <img src="https://avatars.githubusercontent.com/u/199445501?s=400&u=ffbbb62241b78e250f55fdcc4a52715f87967a19&v=4" alt="pashaoffc avatar">
            </div>
            <div class="title-section">
                <h1>pashaoffc</h1>
                <div class="handle">
                    <i class="fab fa-github"></i> @pashaoffc · he/him
                </div>
                <div class="bio">
                    ⚡ Nice vibecode kid, love mc, doing some cool stuff, Real ai lover))
                </div>
            </div>
        </div>

        <!-- social links: TikTok, YouTube, GitHub -->
        <div class="social-grid">
            <a href="https://www.tiktok.com/@pashaoffc" target="_blank" rel="noopener" class="social-card">
                <i class="fab fa-tiktok tiktok-color"></i>
                <span>@pashaoffc · TikTok</span>
            </a>
            <a href="https://www.youtube.com/@stangd" target="_blank" rel="noopener" class="social-card">
                <i class="fab fa-youtube youtube-color"></i>
                <span>@stangd · YouTube</span>
            </a>
            <a href="https://github.com/pashaoffc" target="_blank" rel="noopener" class="social-card">
                <i class="fab fa-github github-color"></i>
                <span>pashaoffc · GitHub</span>
            </a>
        </div>

        <!-- languages: HTML, Python, Lua -->
        <div class="language-strip">
            <span class="lang-pill"><i class="fab fa-html5 html5-color"></i> HTML</span>
            <span class="lang-pill"><i class="fab fa-python python-color"></i> Python</span>
            <span class="lang-pill"><i class="fas fa-moon lua-color"></i> Lua</span>
        </div>

        <!-- github preview -->
        <div class="github-extras">
            <div class="repo-preview">
                <i class="fab fa-github-alt"></i>
                <div class="info">
                    <strong>pashaoffc/pashaoffc</strong>
                    <small>public · active</small>
                </div>
            </div>
            <a href="https://github.com/pashaoffc?tab=repositories" target="_blank" class="pill-link">
                <i class="fas fa-star"></i> repos
                <i class="fas fa-arrow-right"></i>
            </a>
        </div>

        <!-- clean footer with NO avatar hints or reminders -->
        <div class="footnote">
            ✦ 
            <a href="https://www.tiktok.com/@pashaoffc" target="_blank">TikTok</a>  ·  
            <a href="https://www.youtube.com/@stangd" target="_blank">YouTube</a>  ·  
            <a href="https://github.com/pashaoffc" target="_blank">GitHub</a> 
            <span style="display: inline-block; margin-left: 0.8rem; background: #2b313e; padding: 0.2rem 0.7rem; border-radius: 30px;">
                <i class="fas fa-check-circle" style="color: #50e3c2;"></i> hosted on GitHub Pages
            </span>
        </div>
    </div>
</body>
</html>
