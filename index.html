<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasha | Portfolio</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --border-color: #30363d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            width: 100%;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            margin-bottom: 15px;
        }
        h1 { margin: 10px 0; color: #fff; }
        .status { color: #8b949e; font-style: italic; }
        
        .section {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }
        h2 { border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-top: 0; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }
        .stats-grid img { width: 100%; border-radius: 6px; }
        
        .links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            transition: 0.3s;
        }
        .tiktok { background: #ff0050; }
        .youtube { background: #ff0000; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <!-- Замени ссылку на свое фото, если хочешь -->
        <img src="https://github.com" alt="Pasha" class="profile-img">
        <h1>Pasha (pashaoffc)</h1>
        <p class="status">Minecraft 🍦 I use raven b++ peak client</p>
    </header>

    <div class="section">
        <h2>💫 Обо мне</h2>
        <p>Привет! Я Паша (pashaoffc). <br> Очень зависим от ТикТока. Играю в Майнкрафт и Роблокс.</p>
    </div>

    <div class="section">
        <h2>📊 Моя статистика GitHub</h2>
        <div class="stats-grid">
            <!-- Виджеты статистики -->
            <img src="https://github-readme-stats.vercel.app" alt="GitHub Stats">
            <img src="https://github-readme-streak-stats.herokuapp.com" alt="GitHub Streak">
        </div>
    </div>

    <div class="links">
        <a href="https://www.tiktok.com/@pashaoffc" class="btn tiktok" target="_blank">TikTok</a>
        <a href="https://www.youtube.com" class="btn youtube" target="_blank">YouTube</a>
    </div>
</div>

</body>
</html>
